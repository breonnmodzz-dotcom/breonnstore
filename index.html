<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BREONN CYBER STORE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;800&family=Orbitron:wght@400;700;900&display=swap');

:root {
    --neon-cyan: #00f5ff;
    --neon-purple: #aa00ff;
    --dark-bg: #05050a;
    --card-bg: rgba(15,15,25,0.9);
    --glass: rgba(255,255,255,0.05);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background: var(--dark-bg);
    font-family: 'Exo 2', sans-serif;
    color: #fff;
    overflow-x: hidden;
    min-height: 100vh;
    position: relative;
}

.matrix-bg {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(circle at 20% 80%, var(--neon-cyan) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, var(--neon-purple) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, var(--neon-cyan) 0%, transparent 50%);
    animation: pulse 8s ease-in-out infinite;
    z-index: 1;
}

@keyframes pulse {
    0%, 100% { opacity: 0.4; transform: scale(1); }
    50% { opacity: 0.7; transform: scale(1.05); }
}

header {
    height: 100vh; display: flex; align-items: center; justify-content: center;
    position: relative; z-index: 2;
}

.logo-container {
    text-align: center; backdrop-filter: blur(30px);
    background: var(--glass); border: 1px solid var(--neon-cyan);
    padding: 60px 80px; border-radius: 40px; box-shadow: 0 0 100px rgba(0,245,255,0.3);
}

.logo {
    font-family: 'Orbitron', monospace;
    font-size: clamp(4rem, 15vw, 9rem);
    background: linear-gradient(45deg, var(--neon-cyan), var(--neon-purple), var(--neon-cyan));
    background-size: 200% 200%;
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: neon-flow 3s ease-in-out infinite, glitch 0.3s infinite;
    text-transform: uppercase; letter-spacing: 8px;
}

@keyframes neon-flow {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
}

@keyframes glitch {
    0%, 100% { transform: translate(0); }
    20% { transform: translate(-2px, 2px); }
    40% { transform: translate(-2px, -2px); }
    60% { transform: translate(2px, 2px); }
    80% { transform: translate(2px, -2px); }
}

.tagline {
    font-size: clamp(1.4rem, 4vw, 2rem); color: var(--neon-cyan);
    margin-top: 30px; font-weight: 300; letter-spacing: 3px;
    animation: fadeInUp 1s ease 0.5s both;
}

@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(50px); }
    to { opacity: 1; transform: translateY(0); }
}

.plans-section {
    min-height: 100vh; padding: 120px 40px; position: relative; z-index: 2;
    display: flex; flex-direction: column; align-items: center;
}

.section-title {
    font-family: 'Exo 2', sans-serif; font-size: clamp(2.5rem, 8vw, 4rem);
    background: linear-gradient(135deg, var(--neon-purple), var(--neon-cyan));
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 100px; animation: fadeInUp 1s ease both;
}

.plans-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
    gap: 50px; width: 100%; max-width: 2000px;
}

.cyber-card {
    background: var(--card-bg); backdrop-filter: blur(40px);
    border: 2px solid var(--glass); border-radius: 25px;
    padding: 70px 50px; position: relative; overflow: hidden;
    transition: all 0.6s cubic-bezier(0.23,1,0.32,1);
    animation: cardRise 1s ease both;
}

.cyber-card:nth-child(1) { animation-delay: 0.2s; }
.cyber-card:nth-child(2) { animation-delay: 0.4s; }
.cyber-card:nth-child(3) { animation-delay: 0.6s; }
.cyber-card:nth-child(4) { animation-delay: 0.8s; }
.cyber-card:nth-child(5) { animation-delay: 1s; }

@keyframes cardRise {
    from { opacity: 0; transform: translateY(100px) scale(0.8); }
    to { opacity: 1; transform: translateY(0) scale(1); }
}

.cyber-card::before {
    content: ''; position: absolute; top: -50%; left: -50%; 
    width: 200%; height: 200%; background: conic-gradient(var(--neon-cyan), transparent);
    opacity: 0; transition: opacity 0.5s;
}

.cyber-card:hover::before { opacity: 0.3; }
.cyber-card:hover {
    transform: translateY(-30px) scale(1.05); border-color: var(--neon-cyan);
    box-shadow: 0 60px 120px rgba(0,245,255,0.4);
}

.duration {
    font-family: 'Orbitron', monospace; font-size: clamp(2.8rem, 10vw, 4rem);
    background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple));
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 40px; font-weight: 800;
}

.action-btn {
    display: block; width: 100%; padding: 25px;
    background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
    color: #000; text-decoration: none; font-family: 'Orbitron', monospace;
    font-size: 1.4rem; font-weight: 800; text-transform: uppercase;
    border-radius: 20px; position: relative; overflow: hidden;
    box-shadow: 0 25px 60px rgba(0,245,255,0.5);
    transition: all 0.4s ease;
}

.action-btn::before {
    content: ''; position: absolute; top: 0; left: -100%;
    width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
    transition: left 0.6s;
}

.action-btn:hover::before { left: 100%; }
.action-btn:hover {
    transform: scale(1.08); box-shadow: 0 40px 80px rgba(0,245,255,0.7);
}

.telegram-section {
    padding: 120px 40px; text-align: center; position: relative; z-index: 2;
}

.telegram-btn {
    display: inline-block; padding: 30px 80px;
    background: linear-gradient(45deg, var(--neon-purple), var(--neon-cyan));
    border: 3px solid var(--neon-cyan); color: #000;
    font-family: 'Orbitron', monospace; font-size: 1.6rem;
    font-weight: 900; text-transform: uppercase; letter-spacing: 4px;
    text-decoration: none; border-radius: 50px;
    box-shadow: 0 30px 70px rgba(0,245,255,0.4);
    position: relative; overflow: hidden;
    transition: all 0.5s ease;
}

.telegram-btn:hover {
    transform: translateY(-15px) scale(1.1);
    box-shadow: 0 50px 100px rgba(0,245,255,0.6);
}

.support-notice {
    margin-top: 80px; padding: 50px;
    background: var(--glass); border: 2px solid var(--neon-purple);
    border-radius: 30px; backdrop-filter: blur(30px);
    font-size: 1.3rem; line-height: 1.6;
}

@media (max-width: 1400px) { .plans-grid { gap: 40px; } }
@media (max-width: 1000px) { 
    .plans-grid { grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 35px; }
}
@media (max-width: 768px) {
    .plans-section, .telegram-section { padding-left: 20px; padding-right: 20px; }
}
@media (max-width: 480px) {
    .plans-grid { grid-template-columns: 1fr; }
    .cyber-card { margin: 0 10px; }
}
</style>
</head>
<body>

</body>
</html>
