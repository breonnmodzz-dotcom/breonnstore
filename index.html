<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BREONN STORE</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background: #000;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    overflow-x: hidden;
    min-height: 100vh;
}

.hero {
    height: 100vh;
    background: radial-gradient(circle at center, #ff00ff10 0%, #00ffaa20 50%, #000 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    position: relative;
}

.hero h1 {
    font-size: clamp(4rem, 15vw, 10rem);
    font-weight: 900;
    background: linear-gradient(135deg, #ff00ff, #00ffaa, #ffff00, #ff00ff);
    background-size: 300% 300%;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: rainbow 4s ease infinite;
    margin-bottom: 1rem;
    letter-spacing: -0.05em;
}

@keyframes rainbow {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
}

.hero p {
    font-size: clamp(1.5rem, 5vw, 2.5rem);
    color: #aaa;
    font-weight: 300;
    margin-bottom: 4rem;
}

.packages {
    max-width: 2000px;
    margin: 0 auto;
    padding: 8rem 2rem;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
    gap: 4rem 3rem;
}

.package {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px;
    padding: 4rem 3rem;
    text-align: center;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    backdrop-filter: blur(20px);
}

.package::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, #ff00ff, #00ffaa, #ffff00);
    border-radius: 24px 24px 0 0;
    opacity: 0;
    transition: opacity 0.3s;
}

.package:hover::before {
    opacity: 1;
}

.package:hover {
    transform: translateY(-20px);
    border-color: rgba(255,255,255,0.3);
    box-shadow: 0 40px 80px rgba(0,255,255,0.2);
}

.duration {
    font-size: clamp(3rem, 12vw, 5rem);
    font-weight: 800;
    background: linear-gradient(45deg, #fff, #ccc);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 2rem;
    font-family: 'SF Pro Display', -apple-system, sans-serif;
}

.cta {
    display: inline-block;
    padding: 1.5rem 3rem;
    background: linear-gradient(135deg, #ff00ff, #00ffaa);
    color: #000;
    text-decoration: none;
    font-weight: 700;
    font-size: 1.3rem;
    border-radius: 50px;
    text-transform: uppercase;
    letter-spacing: 2px;
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease;
    box-shadow: 0 20px 40px rgba(0,255,255,0.3);
}

.cta:hover {
    transform: translateY(-5px) scale(1.05);
    box-shadow: 0 30px 60px rgba(0,255,255,0.5);
}

.telegram-section {
    padding: 8rem 2rem;
    text-align: center;
    background: rgba(0,0,0,0.5);
}

.telegram-btn {
    display: inline-block;
    padding: 2rem 4rem;
    background: linear-gradient(45deg, #ff00ff, #00ffaa);
    border: 3px solid #fff;
    color: #000;
    font-weight: 800;
    font-size: 1.6rem;
    text-transform: uppercase;
    letter-spacing: 3px;
    text-decoration: none;
    border-radius: 100px;
    box-shadow: 0 25px 50px rgba(255,0,255,0.4);
    transition: all 0.4s ease;
}

.telegram-btn:hover {
    transform: translateY(-10px);
    box-shadow: 0 40px 80px rgba(255,0,255,0.6);
}

.notice {
    margin-top: 4rem;
    padding: 3rem 4rem;
    background: rgba(255,255,255,0.05);
    border: 2px solid #ff00ff;
    border-radius: 20px;
    font-size: 1.2rem;
    backdrop-filter: blur(15px);
}

@media (max-width: 1400px) {
    .packages { grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 3rem 2.5rem; }
}

@media (max-width: 1000px) {
    .packages { grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 2.5rem 2rem; }
}

@media (max-width: 768px) {
    .packages { padding: 6rem 1.5rem; gap: 2rem 1.5rem; }
    .package { padding: 3rem 2rem; }
}

@media (max-width: 480px) {
    .packages { grid-template-columns: 1fr; }
    .package { margin: 0 1rem; }
}
</style>
</head>
<body>

<div class="hero">
    <h1>BREONN STORE</h1>
    <p>ESCOLHA SEU PLANO</p>
</div>

<div class="packages">
    <div class="package">
        <div class="duration">1 DIA</div>
        <a class="cta" href="https://go.tribopay.com.br/yklp5?affh=x5wgclgrn0" target="_blank" rel="noopener">COMPRAR</a>
    </div>
    <div class="package">
        <div class="duration">3 DIAS</div>
        <a class="cta" href="https://go.tribopay.com.br/zo7dl?affh=hhveq7ou8t" target="_blank" rel="noopener">COMPRAR</a>
    </div>
    <div class="package">
        <div class="duration">7 DIAS</div>
        <a class="cta" href="https://go.tribopay.com.br/cqclz?affh=wrh4k07eft" target="_blank" rel="noopener">COMPRAR</a>
    </div>
    <div class="package">
        <div class="duration">15 DIAS</div>
        <a class="cta" href="https://go.tribopay.com.br/dqdqq3dsif?affh=wxku54jbmb" target="_blank" rel="noopener">COMPRAR</a>
    </div>
    <div class="package">
        <div class="duration">30 DIAS</div>
        <a class="cta" href="https://go.tribopay.com.br/i8qvxtthwf?affh=hsub5toe4i" target="_blank" rel="noopener">COMPRAR</a>
    </div>
</div>

<div class="telegram-section">
    <a class="telegram-btn" href="https://t.me/breonnmodz" target="_blank" rel="noopener">SUPORTE TELEGRAM</a>
    <div class="notice">
        📱 <strong>PROBLEMAS NO TELEGRAM?</strong><br>
        Segure "COMPRAR" → "Abrir no navegador" ou copie o link!
    </div>
</div>

</body>
</html>
