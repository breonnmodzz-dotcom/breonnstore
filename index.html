<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BREONN STORE</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    background:#000;
    color:white;
    text-align:center;
}

.banner{
    width:100%;
    height:300px;
    background:url('banner.jpg') center/cover no-repeat;
    display:flex;
    align-items:end;
    justify-content:center;
    padding-bottom:20px;
}

.banner h1{
    font-size:28px;
    background:rgba(0,0,0,0.6);
    padding:10px 20px;
    border-radius:10px;
}

.container{
    padding:30px 15px 60px;
    display:flex;
    flex-direction:column;
    gap:25px;
    align-items:center;
}

.card{
    width:95%;
    max-width:380px;
    padding:25px;
    border-radius:20px;
    background:#111;
    box-shadow: 0 0 20px rgba(255,140,0,0.3);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-6px);
    box-shadow: 0 0 30px rgba(255,140,0,0.6);
}

.plan{
    font-size:22px;
    font-weight:bold;
    margin-bottom:15px;
}

.btn{
    display:inline-block;
    text-decoration:none;
    padding:12px 28px;
    border-radius:30px;
    font-weight:bold;
    background: linear-gradient(90deg,#ff9900,#ff6600);
    color:white;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.08);
    box-shadow:0 0 20px #ff6600;
}

.telegram-btn{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#0088cc;
    color:white;
    padding:15px 20px;
    border-radius:50px;
    font-weight:bold;
    text-decoration:none;
    box-shadow:0 0 20px rgba(0,136,204,0.6);
    transition:0.3s;
}

.telegram-btn:hover{
    transform:scale(1.1);
}

footer{
    margin:40px 0 20px;
    font-size:12px;
    color:#666;
}
</style>
</head>

<body>

<div class="banner">
    <h1>🔥 BREONN STORE 🔥</h1>
</div>

<div class="container">

<div class="card">
<div class="plan">Pato Team - 1 Dia</div>

</div>

<div class="card">
<div class="plan">Pato Team - 3 Dias</div>
<a class="btn" href="https://go.tribopay.com.br/uumgyfiarg?affh=hhveq7ou8t">Comprar Agora</a>
</div>

<div class="card">

<a class="btn" href="https://go.tribopay.com.br/u55svgvlpt?affh=wrh4k07eft">Comprar Agora</a>
</div>

<div class="card">

<a class="btn" href="https://go.tribopay.com.br/dqdqq3dsif?affh=wxku54jbmb">Comprar Agora</a>
</div>

<div class="card">

</div>
