<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BREONN STORE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto:wght@300;500&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Roboto', sans-serif;
    background: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #21262d 100%);
    color: #fff;
    min-height: 100vh;
    overflow-x: hidden;
}

header img {
    width: 100%; height: 300px; object-fit: cover;
    filter: brightness(1.1) contrast(1.1);
}

.content {
    max-width: 100%; padding: 80px 30px; text-align: center;
}

h1 {
    font-family: 'Orbitron', monospace; 
    font-size: clamp(3.5rem, 12vw, 7rem);
    background: linear-gradient(45deg, #00ff88, #00cc6a, #00ff88);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 25px;
    animation: glow 2s ease-in-out infinite alternate;
    filter: drop-shadow(0 0 30px rgba(0,255,136,0.7));
}

@keyframes glow {
    0% { filter: drop-shadow(0 0 20px #00ff88); }
    100% { filter: drop-shadow(0 0 40px #00ff88); }
}

.subtitle {
    color: #c9d1d9; font-size: clamp(1.3rem, 4vw, 1.8rem);
    font-weight: 300; margin-bottom: 60px;
}

.plans {
    display: flex; flex-wrap: wrap; justify-content: center;
    gap: 35px; padding: 0 20px; max-width: 1600px; margin: 0 auto;
}

.plan {
    flex: 1 1 320px; max-width: 380px; background: rgba(20,22,26,0.95);
    backdrop-filter: blur(25px); border-radius: 30px; padding: 60px 40px;
    border: 2px solid rgba(40,46,56,0.5); transition: all 0.4s ease;
    position: relative; overflow: hidden;
}

.plan::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 6px; background: linear-gradient(90deg, #00ff88, #00cc6a, #00ff88);
    opacity: 0; transition: opacity 0.3s;
}

.plan:hover::before { opacity: 1; }
.plan:hover {
    transform: translateY(-25px) scale(1.03); border-color: #00ff88;
    box-shadow: 0 50px 100px rgba(0,255,136,0.4);
    background: rgba(20,22,26,1);
}

.plan h2 {
    font-family: 'Orbitron', monospace; font-size: clamp(2.2rem, 7vw, 3rem);
    margin-bottom: 40px; font-weight: 900;
    background: linear-gradient(45deg, #fff, #e6e6e6);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
}

.btn {
    display: inline-block; padding: 20px 50px; border-radius: 40px;
    text-decoration: none; background: linear-gradient(45deg, #00ff88, #00cc6a);
    color: #000; font-weight: 800; font-size: 1.2rem;
    text-transform: uppercase; letter-spacing: 2px;
    box-shadow: 0 20px 50px rgba(0,255,136,0.5);
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1);
    position: relative; overflow: hidden;
}

.btn:hover {
    transform: translateY(-8px) scale(1.1);
    box-shadow: 0 35px 70px rgba(0,255,136,0.7);
}

.telegram {
    margin: 80px 0; padding: 25px 0;
}

.telegram a {
    display: inline-block; padding: 22px 60px; border-radius: 50px;
    text-decoration: none; font-weight: 700; font-size: 1.3rem;
    background: linear-gradient(45deg, #21262d, #30363d);
    border: 3px solid #00ff88; color: #fff;
    text-transform: uppercase; letter-spacing: 1.5px;
    box-shadow: 0 20px 50px rgba(0,255,136,0.3);
    position: relative; overflow: hidden;
    transition: all 0.5s ease;
}

.telegram a::before {
    content: ''; position: absolute; top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    transition: left 0.7s;
}

.telegram a:hover::before { left: 100%; }
.telegram a:hover {
    transform: translateY(-10px); background: linear-gradient(45deg, #00ff88, #00cc6a);
    box-shadow: 0 35px 70px rgba(0,255,136,0.6); color: #000;
}

.support {
    background: rgba(0,255,136,0.1); border: 2px solid rgba(0,255,136,0.4);
    border-radius: 25px; padding: 40px; margin: 60px 0;
    backdrop-filter: blur(20px); color: #c9d1d9; font-size: 1.1rem;
}

/* RESPONSIVO PERFEITO */
@media (max-width: 1400px) { .plans { gap: 30px; } }
@media (max-width: 1100px) { 
    .plans { flex-direction: column; align-items: center; gap: 40px; }
    .plan { max-width: 400px; }
}
@media (max-width: 768px) {
    .content { padding: 50px 20px; }
    .plan { padding: 45px 30px; }
}
@media (max-width: 480px) {
    .plans { gap: 30px; }
    .plan { padding: 35px 25px; margin: 0 10px; }
}
</style>
</head>
