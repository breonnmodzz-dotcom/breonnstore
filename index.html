<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BREONN STORE</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto:wght@300;400;500&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Roboto', sans-serif;
    background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 40%, #16213e 100%);
    color: #fff;
    min-height: 100vh;
    overflow-x: hidden;
}

/* Fundo partículas leve */
.particles {
    position: fixed; inset: 0; pointer-events: none; z-index: 1;
}
.particle {
    position: absolute; width: 3px; height: 3px;
    background: rgba(0,255,136,0.5); border-radius: 50%;
    animation: float 8s infinite linear;
}
@keyframes float {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-50px) scale(1); opacity: 0; }
}

/* Cursor minimalista */
.cursor {
    position: fixed; width: 14px; height: 14px;
    background: conic-gradient(#00ff88, transparent);
    border-radius: 50%; pointer-events: none;
    z-index: 9999; transition: transform 0.2s ease;
    will-change: transform;
}
.cursor.hover { transform: scale(1.8) !important; box-shadow: 0 0 20px #00ff88; }

header img {
    width: 100%; max-height: 280px; object-fit: cover;
    filter: brightness(1.15) contrast(1.1);
    z-index: 2; position: relative;
}

.main {
    max-width: 1800px; margin: 0 auto; padding: 60px 40px;
    position: relative; z-index: 2; text-align: center;
}

h1 {
    font-family: 'Orbitron', monospace; font-size: clamp(3rem, 10vw, 6rem);
    background: linear-gradient(45deg, #00ff88 0%, #00cc6a 50%, #00ff88 100%);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 20px; text-shadow: 0 0 30px rgba(0,255,136,0.6);
    animation: glow 2.5s ease-in-out infinite alternate;
}
@keyframes glow { 
    from { filter: drop-shadow(0 0 15px #00ff88); }
    to { filter: drop-shadow(0 0 35px #00ff88); }
}

.subtitle {
    color: #b8b8b8; font-size: clamp(1.2rem, 4vw, 1.6rem);
    font-weight: 300; margin-bottom: 50px;
}

.telegram a, .btn {
    cursor: none; display: inline-block; padding: 18px 50px;
    border-radius: 50px; text-decoration: none; font-weight: 600;
    font-size: 1.15rem; background: linear-gradient(45deg, #1e1e28, #2b2b38);
    border: 2px solid #00ff88; color: #fff; position: relative; overflow: hidden;
    transition: all 0.4s cubic-bezier(0.23,1,0.32,1); box-shadow: 0 12px 35px rgba(0,255,136,0.25);
    text-transform: uppercase; letter-spacing: 1px;
}
.telegram a::before {
    content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
    transition: left 0.6s;
}
.telegram a:hover::before { left: 100%; }
.telegram a:hover {
    transform: translateY(-6px); box-shadow: 0 25px 50px rgba(0,255,136,0.5);
    background: linear-gradient(45deg, #00ff88, #00cc6a); color: #111;
}

.container {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 60px; justify-items: center; margin-top: 40px;
}
.card {
    background: rgba(18,18,25,0.9); backdrop-filter: blur(20px);
    border-radius: 32px; padding: 50px 40px; border: 1px solid rgba(40,40,50,0.5);
    transition: all 0.5s cubic-bezier(0.175,0.885,0.32,1.275);
    position: relative; overflow: hidden; width: 100%; max-width: 350px;
    opacity: 0; transform: translateY(40px) scale(0.95);
    animation: cardSlide 0.7s ease forwards;
}
.card:nth-child(1) { animation-delay: 0.15s; }
.card:nth-child(2) { animation-delay: 0.25s; }
.card:nth-child(3) { animation-delay: 0.35s; }
.card:nth-child(4) { animation-delay: 0.45s; }
.card:nth-child(5) { animation-delay: 0.55s; }
@keyframes cardSlide {
    to { opacity: 1; transform: translateY(0) scale(1); }
}
.card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 6px;
    background: linear-gradient(90deg, transparent, #00ff88, #00cc6a, #00ff88, transparent);
    opacity: 0; transition: opacity 0.4s;
}
.card:hover::before { opacity: 1; }
.card:hover {
    transform: translateY(-20px) scale(1.05); border-color: #00ff88;
    box-shadow: 0 40px 80px rgba(0,255,136,0.4); background: rgba(18,18,25,0.98);
}

.card h2 {
    font-family: 'Orbitron', monospace; font-size: clamp(2rem, 6vw, 2.6rem);
    margin-bottom: 30px; font-weight: 800;
    background: linear-gradient(45deg, #fff, #ddd); -webkit-background-clip: text;
    background-clip: text; -webkit-text-fill-color: transparent;
}

.btn {
    background: linear-gradient(45deg, #00ff88, #00cc6a); color: #111;
    font-weight: 800; font-size: 1.1rem; box-shadow: 0 15px 40px rgba(0,255,136,0.5);
}
.btn:hover {
    transform: translateY(-4px) scale(1.08); box-shadow: 0 30px 60px rgba(0,255,136,0.7);
}

.help-box {
    background: rgba(0,255,136,0.08); border: 1px solid rgba(0,255,136,0.3);
    border-radius: 20px; padding: 30px 40px; margin: 50px 0;
    color: #ccc; font-size: 1.05rem; backdrop-filter: blur(15px);
}

/* Responsivo perfeito */
@media (max-width: 1200px) { .container { gap: 45px; } }
@media (max-width: 900px) { .container { grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 35px; .main { padding: 0 25px; } } }
@media (max-width: 600px) { .container { grid-template-columns: 1fr; gap: 30px; .card { padding: 35px 30px; max-width: none; } } }
</style>
</head>

<body>
<div class="particles" id="particles"></div>
<div class="cursor" id="cursor"></div>

<header><img src="banner.jpg" alt="BREONN STORE"></header>

<div class="main">
<h1>BREONN STORE</h1>
<p class="subtitle">Pato Team - Escolha seu período</p>

<div class="telegram">
<a href="https://t.me/breonnmodz" target="_blank" rel="noopener">Falar no Telegram</a>
</div>

<div class="help-box">
📱 <strong>Problema no Telegram?</strong><br>
Segure o botão "Comprar" → <strong>"Abrir no navegador"</strong> ou copie o link e abra no Chrome!
</div>

<div class="container">
<div class="card">
<h2>1 Dia</h2>
<a class="btn" href="https://go.tribopay.com.br/yklp5?affh=x5wgclgrn0" target="_blank" rel="noopener">Comprar</a>
</div>
<div class="card">
<h2>3 Dias</h2>
<a class="btn" href="https://go.tribopay.com.br/zo7dl?affh=hhveq7ou8t" target="_blank" rel="noopener">Comprar</a>
</div>
<div class="card">
<h2>7 Dias</h2>
<a class="btn" href="https://go.tribopay.com.br/cqclz?affh=wrh4k07eft" target="_blank" rel="noopener">Comprar</a>
</div>
<div class="card">
<h2>15 Dias</h2>
<a class="btn" href="https://go.tribopay.com.br/dqdqq3dsif?affh=wxku54jbmb" target="_blank" rel="noopener">Comprar</a>
</div>
<div class="card">
<h2>30 Dias</h2>
<a class="btn" href="https://go.tribopay.com.br/i8qvxtthwf?affh=hsub5toe4i" target="_blank" rel="noopener">Comprar</a>
</div>
</div>
</div>

<script>
    // Partículas leves
    setInterval(() => {
        const p = document.createElement('div');
        p.className = 'particle'; p.style.left = Math.random()*100+'%';
        p.style.animationDuration = (Math.random()*3+5)+'s';
        document.getElementById('particles').appendChild(p);
        setTimeout(()=>p.remove(), 8000);
    }, 350);

    // Cursor suave otimizado
    const cursor = document.getElementById('cursor');
    let mx=0, my=0, cx=0, cy=0;
    const animate = () => {
        cx += (mx - cx) * 0.18; cy += (my - cy) * 0.18;
        cursor.style.transform = `translate(${cx}px, ${cy}px)`;
        requestAnimationFrame(animate);
    }; animate();

    document.addEventListener('mousemove', e => { mx = e.clientX-7; my = e.clientY-7; });
    document.querySelectorAll('a, .card').forEach(el => {
        el.onmouseenter = () => cursor.classList.add('hover');
        el.onmouseleave = () => cursor.classList.remove('hover');
    });
</script>
</body>
</html>
