<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BREONN STORE</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background: #0a0a0a;
    color: #fff;
    font-family: 'Segoe UI', -apple-system, sans-serif;
    line-height: 1.6;
    overflow-x: hidden;
}

header img {
    width: 100%; height: 400px; object-fit: cover;
    filter: brightness(1.05) contrast(1.1);
}

.main-content {
    max-width: 1800px; margin: 0 auto; padding: 80px 30px;
    text-align: center;
}

h1 {
    font-size: clamp(3.5rem, 10vw, 6rem);
    font-weight: 900;
    color: #fff;
    margin-bottom: 20px;
    text-shadow: 0 0 40px #ff6200;
    animation: glowOrange 2s ease-in-out infinite alternate;
}

@keyframes glowOrange {
    from { text-shadow: 0 0 20px #ff6200, 0 0 40px #ff6200; }
    to { text-shadow: 0 0 30px #ff6200, 0 0 60px #ff6200, 0 0 80px #ff6200; }
}

.subtitle {
    color: #ccc; font-size: clamp(1.3rem, 3vw, 1.8rem);
    font-weight: 300; margin-bottom: 60px;
}

.plans-container {
    display: flex; flex-wrap: wrap; justify-content: center;
    gap: 40px; width: 100%;
}

.plan-card {
    background: #1a1a1a; 
    border: 2px solid #333;
    border-radius: 24px;
    padding: 60px 40px;
    flex: 1 1 380px; /* CHAVE: expande pra preencher! */
    max-width: 420px;
    transition: all 0.4s ease;
    position: relative;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

.plan-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 6px; background: linear-gradient(90deg, #ff6200, #ff8c42, #ff6200);
    border-radius: 22px 22px 0 0; opacity: 0.7;
}

.plan-card:hover {
    transform: translateY(-25px);
    border-color: #ff6200;
    box-shadow: 0 40px 100px rgba(255,98,0,0.3);
}

.duration {
    font-size: clamp(2.8rem, 8vw, 4rem);
    font-weight: 900;
    color: #fff;
    margin-bottom: 35px;
    text-shadow: 0 0 20px #ff6200;
}

.buy-btn {
    display: block; width: 100%;
    padding: 20px 30px;
    background: linear-gradient(135deg, #ff6200, #ff8c42);
    color: #fff;
    text-decoration: none;
    font-weight: 800;
    font-size: 1.3rem;
    border-radius: 16px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 15px 40px rgba(255,98,0,0.4);
    transition: all 0.3s ease;
}

.buy-btn:hover {
    transform: translateY(-5px) scale(1.03);
    box-shadow: 0 25px 60px rgba(255,98,0,0.6);
    color: #fff;
}

.telegram-section {
    margin: 80px 0; padding: 40px 0;
}

.telegram-btn {
    display: inline-block;
    padding: 25px 60px;
    background: #000;
    border: 4px solid #ff6200;
    color: #ff6200;
    font-weight: 900;
    font-size: 1.5rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    text-decoration: none;
    border-radius: 50px;
    box-shadow: 0 20px 50px rgba(255,98,0,0.3);
    transition: all 0.4s ease;
}

.telegram-btn:hover {
    background: linear-gradient(135deg, #ff6200, #ff8c42);
    color: #fff;
    transform: translateY(-8px);
    box-shadow: 0 35px 70px rgba(255,98,0,0.5);
}

.help-box {
    background: rgba(255,98,0,0.1);
    border: 2px solid rgba(255,98,0,0.3);
    border-radius: 20px;
    padding: 40px;
    margin: 60px 0;
    color: #fff;
    font-size: 1.1rem;
    backdrop-filter: blur(15px);
}

.help-box strong { color: #ff6200; }

/* RESPONSIVO QUE PREENCHE TUDO */
@media (max-width: 1400px) { .plans-container { gap: 35px; } }
@media (max-width: 1100px) { 
    .plans-container { flex-direction: column; align-items: center; gap: 45px; }
    .plan-card { max-width: 450px; }
}
@media (max-width: 768px) {
    .main-content { padding: 60px 20px; }
    .plan-card { padding: 50px 30px; flex: 1 1 350px; }
}
@media (max-width: 480px) {
    .plan-card { margin: 0 15px; padding: 45px 25px; }
}
</style>
</head>
<body>

<header>
    <img src="banner.jpg" alt="BREONN STORE">
</header>

<div class="main-content">
    <h1>BREONN STORE</h1>
    <p class="subtitle">Pato Team - Escolha seu período</p>

    <div class="plans-container">
        <div class="plan-card">
            <div class="duration">1 Dia</div>
            <a class="buy-btn" href="https://go.tribopay.com.br/yklp5?affh=x5wgclgrn0" target="_blank" rel="noopener">COMPRAR</a>
        </div>
        <div class="plan-card">
            <div class="duration">3 Dias</div>
            <a class="buy-btn" href="https://go.tribopay.com.br/zo7dl?affh=hhveq7ou8t" target="_blank" rel="noopener">COMPRAR</a>
        </div>
        <div class="plan-card">
            <div class="duration">7 Dias</div>
            <a class="buy-btn" href="https://go.tribopay.com.br/cqclz?affh=wrh4k07eft" target="_blank" rel="noopener">COMPRAR</a>
        </div>
        <div class="plan-card">
            <div class="duration">15 Dias</div>
            <a class="buy-btn" href="https://go.tribopay.com.br/dqdqq3dsif?affh=wxku54jbmb" target="_blank" rel="noopener">COMPRAR</a>
       </div>
        <div class="plan-card">
            <div class="duration">30 Dias</div>
            <a class="buy-btn" href="https://go.tribopay.com.br/i8qvxtthwf?affh=hsub5toe4i" target="_blank" rel="noopener">COMPRAR</a>
        </div>
    </div>

    <div class="telegram-section">
        <a class="telegram-btn" href="https://t.me/breonnmodz" target="_blank" rel="noopener">Falar no Telegram</a>
    </div>

    <div class="help-box">
        📱 <strong>Problema no Telegram?</strong><br>
        Segure o botão "COMPRAR" → <strong>"Abrir no navegador"</strong> ou copie o link e abra no Chrome!
    </div>
</div>

</body>
</html>
