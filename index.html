<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BREONN STORE</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto:wght@300;500&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Roboto', sans-serif;
    background: linear-gradient(135deg, #0e0e11 0%, #1a1a2e 50%, #16213e 100%);
    color: #ffffff;
    text-align: center;
    overflow-x: hidden;
    min-height: 100vh;
    position: relative;
}

.particles {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 1;
}

.particle {
    position: absolute;
    width: 4px;
    height: 4px;
    background: rgba(0, 255, 136, 0.6);
    border-radius: 50%;
    animation: float 6s infinite linear;
}

@keyframes float {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-100px) scale(1); opacity: 0; }
}

header img {
    width: 100%;
    max-height: 250px;
    object-fit: cover;
    filter: brightness(1.1) contrast(1.05);
    position: relative;
    z-index: 2;
}

.main {
    max-width: 1200px;
    margin: 50px auto;
    padding: 0 20px;
    position: relative;
    z-index: 2;
}

h1 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(2.5rem, 8vw, 4.5rem);
    background: linear-gradient(45deg, #00ff88, #00cc6a, #00ff88);
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 15px;
    text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
    animation: glow 2s ease-in-out infinite alternate;
}

@keyframes glow {
    from { filter: drop-shadow(0 0 10px #00ff88); }
    to { filter: drop-shadow(0 0 25px #00ff88); }
}

.subtitle {
    color: #b0b0b0;
    font-size: 1.3rem;
    margin-bottom: 40px;
    font-weight: 300;
}

.telegram {
    margin-bottom: 50px;
}

.telegram a {
    display: inline-block;
    padding: 16px 40px;
    border-radius: 50px;
    text-decoration: none;
    font-weight: 500;
    font-size: 1.1rem;
    background: linear-gradient(45deg, #1f1f26, #2a2a33);
    border: 2px solid #00ff88;
    color: #fff;
    position: relative;
    overflow: hidden;
    transition: all 0.4s ease;
    box-shadow: 0 8px 25px rgba(0, 255, 136, 0.2);
}

.telegram a::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    transition: left 0.5s;
}

.telegram a:hover::before {
    left: 100%;
}

.telegram a:hover {
    transform: translateY(-3px);
    box-shadow: 0 15px 35px rgba(0, 255, 136, 0.4);
    background: linear-gradient(45deg, #00ff88, #00cc6a);
    color: #000;
}

.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 30px;
    margin-top: 20px;
}

.card {
    background: rgba(21, 21, 27, 0.8);
    backdrop-filter: blur(10px);
    border-radius: 24px;
    padding: 35px 25px;
    border: 1px solid rgba(34, 34, 43, 0.5);
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    position: relative;
    overflow: hidden;
    
    /* Animação RÁPIDA no carregamento - SEM DELAY */
    opacity: 0;
    transform: translateY(20px);
    animation: cardAppear 0.5s ease forwards;
}

/* Cards aparecem rápido e em sequência MÍNIMA */
.card:nth-child(1) { animation-delay: 0.1s; }
.card:nth-child(2) { animation-delay: 0.15s; }
.card:nth-child(3) { animation-delay: 0.2s; }
.card:nth-child(4) { animation-delay: 0.25s; }
.card:nth-child(5) { animation-delay: 0.3s; }

@keyframes cardAppear {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, #00ff88, #00cc6a, #00ff88);
    opacity: 0;
    transition: opacity 0.3s;
}

.card:hover::before {
    opacity: 1;
}

.card:hover {
    transform: translateY(-12px) scale(1.02);
    border-color: #00ff88;
    box-shadow: 0 25px 50px rgba(0, 255, 136, 0.3);
    background: rgba(21, 21, 27, 0.95);
}

.card h2 {
    font-family: 'Orbitron', monospace;
    font-size: 1.8rem;
    margin-bottom: 20px;
    font-weight: 700;
    background: linear-gradient(45deg, #ffffff, #e0e0e0);
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.btn {
    display: inline-block;
    padding: 14px 30px;
    border-radius: 30px;
    text-decoration: none;
    background: linear-gradient(45deg, #00ff88, #00cc6a);
    color: #000;
    font-weight: 700;
    font-size: 1rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.3s ease;
    box-shadow: 0 8px 20px rgba(0, 255, 136, 0.4);
    position: relative;
    overflow: hidden;
}

.btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 15px 30px rgba(0, 255, 136, 0.6);
    opacity: 0.95;
}

.help-box {
    background: rgba(0,255,136,0.1);
    border: 1px solid #00ff88;
    border-radius: 12px;
    padding: 20px;
    margin: 30px 0;
    color: #ccc;
    font-size: 0.95rem;
}

@media (max-width: 480px) {
    .container {
        grid-template-columns: 1fr;
        gap: 20px;
    }
    .card {
        padding: 25px 20px;
    }
}
</style>
</head>

<body>
<div class="particles" id="particles"></div>

<header>
<img src="banner.jpg" alt="BREONN STORE">
</header>

<div class="main">
<h1>BREONN STORE</h1>
<p class="subtitle">Pato Team - Escolha seu período</p>

<div class="telegram">
<a href="https://t.me/breonnmodz" target="_blank" rel="noopener">Falar no Telegram</a>
</div>

<div class="help-box">
📱 <strong>Problema no Telegram?</strong><br>
Segure o botão "Comprar" → <strong>"Abrir no navegador"</strong> ou copie o link e abra no Chrome!
</div>

<div class="container">
<div class="card">
<h2>1 Dia</h2>
<a class="btn" href="https://go.tribopay.com.br/yklp5?affh=x5wgclgrn0" target="_blank" rel="noopener">Comprar</a>
</div>

<div class="card">
<h2>3 Dias</h2>
<a class="btn" href="https://go.tribopay.com.br/zo7dl?affh=hhveq7ou8t" target="_blank" rel="noopener">Comprar</a>
</div>

<div class="card">
<h2>7 Dias</h2>
<a class="btn" href="https://go.tribopay.com.br/cqclz?affh=wrh4k07eft" target="_blank" rel="noopener">Comprar</a>
</div>

<div class="card">
<h2>15 Dias</h2>
<a class="btn" href="https://go.tribopay.com.br/dqdqq3dsif?affh=wxku54jbmb" target="_blank" rel="noopener">Comprar</a>
</div>

<div class="card">
<h2>30 Dias</h2>
<a class="btn" href="https://go.tribopay.com.br/i8qvxtthwf?affh=hsub5toe4i" target="_blank" rel="noopener">Comprar</a>
</div>
</div>
</div>

<script>
    // Partículas flutuantes
    function createParticle() {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.animationDuration = (Math.random() * 3 + 4) + 's';
        particle.style.animationDelay = Math.random() * 2 + 's';
        document.getElementById('particles').appendChild(particle);
        
        setTimeout(() => {
            particle.remove();
        }, 7000);
    }

    setInterval(createParticle, 300);
</script>

</body>
</html>
